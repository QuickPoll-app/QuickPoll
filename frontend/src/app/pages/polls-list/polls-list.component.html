<main class="polls-container">
  <div class="header-section">
    <div>
      <h1 class="page-title">Polls</h1>
      <p class="page-subtitle">Manage and monitor all your polls</p>
    </div>
    <app-buttons variant="primary" (clicked)="onCreatePoll()">
      <div class="button-content">
        <iconify-icon icon="lucide:plus"></iconify-icon>
        <span>Create Poll</span>
      </div>
    </app-buttons>
  </div>

  <div class="filters-section">
    <app-input placeholder="Search polls..." (input)="onSearch($event)"> </app-input>

    <app-filter-tabs [activeTab]="activeFilter()" (tabChanged)="onFilterChange($event)">
    </app-filter-tabs>
  </div>

  <div class="polls-grid">
    @if (filteredPolls.length > 0) {
      @for (poll of filteredPolls; track poll.id) {
        <app-poll-card
          [title]="poll.title"
          [description]="poll.description"
          [status]="poll.status"
          [pollType]="poll.type"
          [isVoted]="poll.isVoted"
          [isAnonymous]="poll.isAnonymous"
          [votes]="poll.votes"
          [participation]="poll.participation"
          [timeLeft]="poll.timeLeft"
          (cardClick)="onPollClick(poll.id)"
        >
        </app-poll-card>
      }
    } @else {
      <div class="no-results">
        <p>No polls found</p>
      </div>
    }
  </div>
</main>
