name: Verify Admin Role After Deployment

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy to Staging"]
    types: [completed]

jobs:
  verify-admin-role:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      - name: Get RDS endpoint from Terraform
        id: terraform
        run: |
          cd infrastructure/environments/staging
          DB_HOST=$(terraform output -raw db_address 2>/dev/null || echo "")
          echo "db_host=$DB_HOST" >> $GITHUB_OUTPUT
      
      - name: Verify admin role
        env:
          DB_HOST: ${{ steps.terraform.outputs.db_host }}
          DB_PORT: 5432
          DB_NAME: quickpoll
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          chmod +x verify-admin-role.sh
          ./verify-admin-role.sh
      
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Admin role verification failed after deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Admin Role Verification Failed*\nEnvironment: Staging\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
      
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ Admin role verified successfully after deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Admin Role Verification Passed*\nEnvironment: Staging\nAdmin user has correct ADMIN role"
                  }
                }
              ]
            }
