name: Verify Admin Role After Deployment

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy to Staging"]
    types: [completed]

jobs:
  verify-admin-role:
    runs-on: ubuntu-latest
    environment: staging
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Get RDS endpoint from Terraform
        id: terraform
        working-directory: ./infrastructure/environments/staging
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_TABLE }}" \
            -backend-config="encrypt=true"
          DB_HOST=$(terraform output -raw db_address)
          DB_PORT=$(terraform output -raw db_port)
          echo "db_host=$DB_HOST" >> $GITHUB_OUTPUT
          echo "db_port=$DB_PORT" >> $GITHUB_OUTPUT
      
      - name: Verify admin role
        env:
          DB_HOST: ${{ steps.terraform.outputs.db_host }}
          DB_PORT: ${{ steps.terraform.outputs.db_port }}
          DB_NAME: quickpoll
          DB_USER: quickpoll
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          chmod +x verify-admin-role.sh
          ./verify-admin-role.sh
      
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Admin role verification failed after deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Admin Role Verification Failed*\nEnvironment: Staging\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
      
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ Admin role verified successfully after deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Admin Role Verification Passed*\nEnvironment: Staging\nAdmin user has correct ADMIN role"
                  }
                }
              ]
            }
