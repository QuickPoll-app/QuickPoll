name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: quickpoll
          POSTGRES_USER: quickpoll
          POSTGRES_PASSWORD: quickpoll123
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: 21, distribution: temurin }
      - name: Build and Test
        working-directory: ./backend
        run: mvn clean package
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/quickpoll
          SPRING_DATASOURCE_USERNAME: quickpoll
          SPRING_DATASOURCE_PASSWORD: quickpoll123

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 18 }
      - name: Install and Build
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          npm run build
