name: CI Pipeline

on:
  push:
    branches: [develop, "feature/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Security Scanning
  security-scan:
    name: Security Scan (Gitleaks, Trivy, Checkov, CodeQL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        id: codeql-init
        continue-on-error: true
        uses: github/codeql-action/init@v3
        with:
          languages: java, javascript

      - name: Set up JDK 21 (for CodeQL)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build backend (for CodeQL)
        working-directory: ./backend
        run: mvn clean package -DskipTests -B

      - name: Perform CodeQL Analysis
        id: codeql
        continue-on-error: true
        uses: github/codeql-action/analyze@v3

      - name: Gitleaks (Secret Detection)
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Trivy (Filesystem Scan)
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scanners: 'vuln'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          skip-dirs: 'infrastructure'

      - name: Checkov (IaC Security)
        id: checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          config_file: .checkov.yml
          quiet: true
          soft_fail: false
          output_format: cli

      - name: Security Scan Summary
        if: always()
        run: |
          echo "" 
          echo "========================================"
          echo "       SECURITY SCAN SUMMARY"
          echo "========================================"
          echo ""
          
          # CodeQL Result
          if [ "${{ steps.codeql.outcome }}" == "success" ]; then
            echo "[PASS] CodeQL: No code security issues found."
          else
            echo "[FAIL] CodeQL: Code security issues detected! Check output above."
          fi
          
          # Gitleaks Result
          if [ "${{ steps.gitleaks.outcome }}" == "success" ]; then
            echo "[PASS] Gitleaks: No secrets detected."
          else
            echo "[FAIL] Gitleaks: Secrets detected! Check output above."
          fi
          
          # Trivy Result
          if [ "${{ steps.trivy.outcome }}" == "success" ]; then
            echo "[PASS] Trivy: No high/critical vulnerabilities found."
          else
            echo "[FAIL] Trivy: High/critical vulnerabilities detected!"
          fi
          
          # Checkov Result
          if [ "${{ steps.checkov.outcome }}" == "success" ]; then
            echo "[PASS] Checkov: No IaC security issues found."
          else
            echo "[FAIL] Checkov: IaC security issues found!"
          fi
          
          echo ""
          echo "========================================"
          
          # Fail the job if any scan failed
          if [ "${{ steps.codeql.outcome }}" != "success" ] || [ "${{ steps.gitleaks.outcome }}" != "success" ] || [ "${{ steps.trivy.outcome }}" != "success" ] || [ "${{ steps.checkov.outcome }}" != "success" ]; then
            echo "[FAIL] Security scan failed. Please fix the issues above."
            exit 1
          else
            echo "[PASS] All security scans passed!"
          fi

  # Backend: Build, Test with PostgreSQL service
  backend-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    needs: security-scan
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ vars.CI_DB_NAME }}
          POSTGRES_USER: ${{ vars.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: ./backend
        run: mvn clean verify -B -Dspring.profiles.active=test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ vars.CI_DB_NAME }}
          SPRING_DATASOURCE_USERNAME: ${{ vars.CI_DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # Frontend: Lint, Build
  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Build production
        working-directory: ./frontend
        run: npm run build -- --configuration=production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # Terraform: Validate & Format Check
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      matrix:
        environment: [staging, prod]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        working-directory: ./infrastructure/environments/${{ matrix.environment }}
        run: terraform fmt -check -recursive

      - name: Terraform Init (backend disabled)
        working-directory: ./infrastructure/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./infrastructure/environments/${{ matrix.environment }}
        run: terraform validate

  # Docker: Build images (no push)
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: data-engineering
            context: ./data-engineering
            dockerfile: ./data-engineering/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ vars.PROJECT_NAME }}-${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Notify Team on Result
  notify:
    name: Notify CI Result
    runs-on: ubuntu-latest
    needs: [security-scan, backend-test, frontend-build, terraform-validate, docker-build]
    if: always()
    steps:
      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "CI Pipeline Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*QuickPoll CI Passed Successfully*\n*Branch:* `${{ github.ref_name }}`\n*By:* ${{ github.actor }}\n\n*Status for Team:*\n* Devs: Unit tests & Linting passed.\n* Data Eng: ETL image built.\n* DevOps: Infrastructure validated.\n* QAs: Ready for merge to `develop`."
                  }
                }
              ]
            }

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "CI Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*QuickPoll CI Failed*\n*Branch:* `${{ github.ref_name }}`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nDevelopers, please check the build logs!"
                  }
                }
              ]
            }
