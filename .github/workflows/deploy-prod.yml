name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: "${{ vars.AWS_REGION }}"
  ECR_REGISTRY: "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
  IMAGE_TAG: "prod-${{ github.sha }}"

permissions:
  contents: write
  statuses: write

jobs:
  # Build and push Docker images to ECR
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ vars.PROJECT_NAME }}-${{ matrix.service }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.service }}-prod
          cache-to: type=gha,scope=${{ matrix.service }}-prod,mode=max

  # Deploy infrastructure — requires Lennox approval
  terraform-apply:
    name: Terraform Apply (Production)
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      alb_url: ${{ steps.capture-alb.outputs.alb_url }}
    environment:
      name: prod
      url: "${{ vars.PROD_ALB_URL }}"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ./infrastructure/environments/prod
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        working-directory: ./infrastructure/environments/prod
        run: terraform plan -out=tfplan
        env:
          TF_VAR_backend_image: ${{ env.ECR_REGISTRY }}/${{ vars.PROJECT_NAME }}-backend:${{ env.IMAGE_TAG }}
          TF_VAR_frontend_image: ${{ env.ECR_REGISTRY }}/${{ vars.PROJECT_NAME }}-frontend:${{ env.IMAGE_TAG }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

      - name: Terraform Apply
        working-directory: ./infrastructure/environments/prod
        run: terraform apply -auto-approve tfplan

      - name: Capture ALB URL and set GitHub Variable
        id: capture-alb
        working-directory: ./infrastructure/environments/prod
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "ALB DNS: $ALB_DNS"
          echo "alb_url=http://$ALB_DNS" >> "$GITHUB_OUTPUT"
          gh variable set PROD_ALB_URL --env prod --body "http://$ALB_DNS" || echo "::warning::Could not set PROD_ALB_URL variable. Set it manually to http://$ALB_DNS"
          echo "PROD_ALB_URL set to http://$ALB_DNS"

  # Health check after deploy
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: terraform-apply
    env:
      ALB_URL: ${{ needs.terraform-apply.outputs.alb_url }}
    steps:
      - name: Wait for services to stabilize
        run: sleep 90

      - name: Health check backend
        run: |
          for i in {1..15}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "${ALB_URL}/actuator/health" || true)
            if [ "$status" = "200" ]; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Attempt $i/15 - Status: $status"
            sleep 20
          done
          echo "Backend health check failed"
          exit 1

      - name: Health check frontend
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${ALB_URL}/" || true)
          if [ "$status" = "200" ]; then
            echo "Frontend health check passed"
          else
            echo "Frontend health check failed with status: $status"
            exit 1
          fi

  # Tag release after successful production deploy
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release tag
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const tag = `release-${sha.substring(0, 7)}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: sha
            });
            console.log(`Created tag: ${tag}`);

  # Slack notifications
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform-apply, health-check, tag-release]
    if: always()
    env:
      ALB_URL: ${{ needs.terraform-apply.outputs.alb_url }}
    steps:
      - name: Notify Slack on success
        if: needs.health-check.result == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Production Deploy Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*QuickPoll Production Deployed*\n*Commit:* `${{ github.sha }}`\n*Tag:* `release-${{ github.sha }}`\n*By:* ${{ github.actor }}\n*URL:* ${{ needs.terraform-apply.outputs.alb_url }}"
                  }
                }
              ]
            }

      - name: Notify Slack on failure
        if: needs.health-check.result == 'failure' || needs.terraform-apply.result == 'failure' || needs.build-and-push.result == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "PRODUCTION Deploy Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*QuickPoll PRODUCTION Deploy Failed*\n*Commit:* `${{ github.sha }}`\n*By:* ${{ github.actor }}\n*Run:* `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`\n\nImmediate attention required!"
                  }
                }
              ]
            }
