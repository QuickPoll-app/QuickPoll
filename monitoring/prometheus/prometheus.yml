# ============================================
# Prometheus Configuration — QuickPoll
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alert rules
rule_files:
  - "alert_rules.yml"

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Scrape targets
scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Spring Boot backend via Actuator
  - job_name: "quickpoll-backend"
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ["backend:8081"]
        labels:
          service: "backend"
          environment: "local"

  # Nginx frontend (via stub_status if enabled)
  - job_name: "quickpoll-frontend"
    metrics_path: /health
    scrape_interval: 30s
    static_configs:
      - targets: ["frontend:80"]
        labels:
          service: "frontend"
          environment: "local"

  # Node exporter (if deployed)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          environment: "local"

  # PostgreSQL exporter (if deployed)
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "database"
          environment: "local"
